name: Deploy Frontend to Vercel

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Vercel environment to deploy
        required: true
        type: choice
        default: production
        options:
          - preview
          - production

env:
  NODE_VERSION: '20'

jobs:
  deploy-preview:
    name: Build and deploy preview
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'preview')
    runs-on: ubuntu-latest
    concurrency:
      group: vercel-preview-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VITE_API_URL: https://hcbe-backend-jaunty-garden-7362.fly.dev
      VITE_ENABLE_MEMBER_LOGIN: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Vercel secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID in:"
            echo "Repository → Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build preview
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        id: deploy-preview
        run: echo "url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")" >> "$GITHUB_OUTPUT"

      - name: Add preview comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Vercel preview: ${{ steps.deploy-preview.outputs.url }}`
            })

      - name: Deployment summary
        run: |
          echo "Preview URL: ${{ steps.deploy-preview.outputs.url }}"

  deploy-production:
    name: Build and deploy production
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    concurrency:
      group: vercel-production
      cancel-in-progress: false
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VITE_API_URL: https://hcbe-backend-jaunty-garden-7362.fly.dev
      VITE_ENABLE_MEMBER_LOGIN: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Vercel secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID in:"
            echo "Repository → Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        id: deploy-production
        run: echo "url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        run: |
          echo "Production URL: ${{ steps.deploy-production.outputs.url }}"
